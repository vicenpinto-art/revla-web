<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revla — Próximamente</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --lila: #a183ff;
      --lila-soft: #c4b0ff;
      --nude: #f5efe8;
      --nude2: #ede4d9;
      --black: #1a1718;
      --gray: #6b6570;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--nude);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-circle { position: fixed; border-radius: 50%; pointer-events: none; opacity: 0.18; }
    .bg-circle-1 { width: 600px; height: 600px; background: var(--lila); top: -200px; right: -150px; animation: float1 8s ease-in-out infinite; }
    .bg-circle-2 { width: 400px; height: 400px; background: var(--lila-soft); bottom: -100px; left: -100px; animation: float2 10s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }
    .wrap { text-align: center; padding: 40px 24px; max-width: 560px; position: relative; z-index: 1; animation: fadeUp .8s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .logo { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-bottom: 48px; animation: fadeUp .8s .1s ease both; }
    .logo em { font-style: italic; color: var(--lila); }
    .tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--lila); border: 1px solid rgba(161,131,255,.4); background: rgba(161,131,255,.08); padding: 6px 16px; border-radius: 100px; margin-bottom: 28px; animation: fadeUp .8s .2s ease both; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 8vw, 58px); font-weight: 700; line-height: 1.1; margin-bottom: 20px; animation: fadeUp .8s .3s ease both; }
    h1 em { font-style: italic; color: var(--lila); }
    .subtitle { font-size: 17px; color: var(--gray); line-height: 1.65; margin-bottom: 48px; animation: fadeUp .8s .4s ease both; }
    .notify-form { display: flex; gap: 10px; max-width: 420px; margin: 0 auto 48px; animation: fadeUp .8s .5s ease both; }
    .notify-form input { flex: 1; padding: 14px 20px; border-radius: 100px; border: 1.5px solid rgba(161,131,255,.3); background: white; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--black); outline: none; transition: border-color .2s; }
    .notify-form input:focus { border-color: var(--lila); }
    .notify-form input::placeholder { color: #b0a8b5; }
    .notify-form button { padding: 14px 24px; border-radius: 100px; background: var(--lila); color: white; border: none; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; white-space: nowrap; transition: transform .2s, box-shadow .2s; box-shadow: 0 4px 20px rgba(161,131,255,.35); }
    .notify-form button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(161,131,255,.5); }
    .notify-form button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }
    .success-msg { display: none; color: var(--lila); font-size: 14px; font-weight: 500; margin-top: -32px; margin-bottom: 48px; }
    .error-msg { display: none; color: #e74c3c; font-size: 13px; margin-top: -36px; margin-bottom: 48px; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; animation: fadeUp .8s .6s ease both; }
    .chip { font-size: 12px; padding: 6px 14px; border-radius: 100px; border: 1px solid var(--nude2); color: var(--gray); background: white; }
    @media (max-width: 480px) { .notify-form { flex-direction: column; } .notify-form button { width: 100%; } }
  </style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="wrap">
    <div class="logo">rev<em>la</em></div>
    <div class="tag">Próximamente</div>
    <h1>Ropa que<br><em>obedece.</em></h1>
    <p class="subtitle">Estamos preparando algo especial.<br>Déjanos tu correo y serás la primera en saberlo.</p>

    <div class="notify-form" id="form-wrap">
      <input type="email" id="email-input" placeholder="tu@correo.com" />
      <button id="btn-enviar" onclick="notificar()">Avisarme</button>
    </div>

    <p class="success-msg" id="success-msg">✓ ¡Listo! Te avisamos cuando abramos.</p>
    <p class="error-msg" id="error-msg">Algo salió mal. Intenta de nuevo.</p>

    <div class="tags-row">
      <span class="chip">Modulable</span>
      <span class="chip">Pole & Lira</span>
      <span class="chip">Heels</span>
      <span class="chip">Transitable</span>
      <span class="chip">Tu cuerpo decide</span>
    </div>
  </div>

  <script>
    async function notificar() {
      var email = document.getElementById('email-input').value.trim();
      var btn = document.getElementById('btn-enviar');
      var errorMsg = document.getElementById('error-msg');

      if (!email || !email.includes('@')) {
        document.getElementById('email-input').style.borderColor = '#f87171';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';
      errorMsg.style.display = 'none';

      try {
        var resp = await fetch('https://formspree.io/f/mgoqnaab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email: email, mensaje: 'Quiere ser notificada del lanzamiento de Revla' })
        });

        if (resp.ok) {
          document.getElementById('form-wrap').style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';
        } else {
          throw new Error('Error');
        }
      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Avisarme';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>

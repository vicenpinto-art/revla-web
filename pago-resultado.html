<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado del pago — Revla</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lila: #a183ff; --lila-soft: #b9a2ff; --lila-pale: #e0d6ff;
      --lila-ghost: #f2eeff; --nude: #f5efe8; --nude2: #ede4d9;
      --black: #1a1718; --gray: #6b6570;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif; background: var(--nude);
      color: var(--black); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      width: 100%; background: rgba(255,255,255,0.96); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(161,131,255,0.15);
      padding: 18px 40px; display: flex; align-items: center;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; text-decoration: none; color: var(--black); }
    .nav-logo em { font-style: italic; color: var(--lila); }

    .resultado-wrap {
      max-width: 520px; width: 100%;
      margin: 60px 24px;
      background: white; border-radius: 28px;
      padding: 56px 48px;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      text-align: center;
    }
    @media (max-width: 560px) { .resultado-wrap { padding: 40px 28px; margin: 32px 16px; } }

    /* ICONO ANIMADO */
    .icono-wrap {
      width: 96px; height: 96px; border-radius: 50%;
      margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: center;
      animation: pop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .icono-exitoso { background: #f0fdf4; }
    .icono-fallido  { background: #fff5f5; }
    .icono-pendiente { background: #fefce8; }

    /* CÍRCULO ANIMADO para éxito */
    .check-circle { animation: pop .5s .1s both cubic-bezier(.34,1.56,.64,1); }
    .check-path { stroke-dasharray: 60; stroke-dashoffset: 60; animation: draw .5s .4s forwards ease-out; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 12px; line-height: 1.15; }
    h1 em { font-style: italic; color: var(--lila); }
    .mensaje { color: var(--gray); font-size: 16px; line-height: 1.6; margin-bottom: 32px; }

    /* INFO EXTRA */
    .info-box {
      background: var(--lila-ghost); border: 1px solid var(--lila-pale);
      border-radius: 14px; padding: 16px 20px; margin-bottom: 32px;
      font-size: 14px; color: var(--gray); line-height: 1.6; text-align: left;
    }
    .info-box strong { color: var(--black); }

    /* BOTONES */
    .btns { display: flex; flex-direction: column; gap: 12px; }
    .btn-primary {
      padding: 14px 28px; border-radius: 100px;
      background: var(--lila); color: white;
      font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px;
      text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(161,131,255,.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(161,131,255,.5); }
    .btn-secondary {
      padding: 14px 28px; border-radius: 100px;
      border: 2px solid var(--nude2); color: var(--gray);
      font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 15px;
      text-decoration: none; display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--lila); color: var(--lila); }

    /* PARÁMETROS DE URL (ocultos, para debug) */
    .mp-params { font-size: 11px; color: #ccc; margin-top: 24px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">rev<em>la</em></a>
</nav>

<div class="resultado-wrap" id="resultado-wrap">
  <!-- Contenido generado por JS según el estado -->
</div>

<script>
  // Lee el parámetro ?estado= de la URL
  var params    = new URLSearchParams(window.location.search);
  var estado    = params.get('estado') || 'fallido';
  var pago_id   = params.get('payment_id') || '';
  var status    = params.get('status') || '';
  var wrap      = document.getElementById('resultado-wrap');

  var contenido = {
    exitoso: {
      icono: `
        <svg class="check-circle" width="96" height="96" viewBox="0 0 96 96" fill="none">
          <circle cx="48" cy="48" r="48" fill="#f0fdf4"/>
          <circle cx="48" cy="48" r="36" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
          <path class="check-path" d="M32 48l12 12 20-24" stroke="#22c55e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>`,
      titulo: '¡Pago <em>exitoso</em>!',
      mensaje: 'Tu pedido fue procesado correctamente. Pronto te enviaremos un correo con los detalles y el estado de tu envío.',
      info: '<strong>¿Qué sigue?</strong> Recibirás un e-mail de confirmación. Nos pondremos en contacto para coordinar el envío. Ante cualquier consulta escríbenos a <strong>revuela.store@gmail.com</strong>.',
      btn1: { texto: '← Volver a Revla', url: 'index.html' },
      btn2: { texto: 'Ver colecciones', url: 'colecciones.html' },
    },
    pendiente: {
      icono: `
        <div class="icono-wrap icono-pendiente">
          <svg width="44" height="44" fill="none" stroke="#ca8a04" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>`,
      titulo: 'Pago <em>en proceso</em>',
      mensaje: 'Tu pago está siendo verificado por MercadoPago. Esto puede tardar unos minutos.',
      info: '<strong>¿Qué sigue?</strong> Una vez confirmado te avisaremos por correo. Si elegiste transferencia bancaria, recuerda completarla para que el pedido avance.',
      btn1: { texto: '← Volver a Revla', url: 'index.html' },
      btn2: { texto: 'Ver colecciones', url: 'colecciones.html' },
    },
    fallido: {
      icono: `
        <div class="icono-wrap icono-fallido">
          <svg width="44" height="44" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
          </svg>
        </div>`,
      titulo: 'Pago <em>no completado</em>',
      mensaje: 'El pago no pudo procesarse. Tu carrito sigue guardado — podés intentarlo de nuevo cuando quieras.',
      info: '<strong>Posibles causas:</strong> fondos insuficientes, datos incorrectos, o el banco rechazó la transacción. Probá con otra tarjeta o método de pago.',
      btn1: { texto: 'Reintentar pago', url: 'checkout.html' },
      btn2: { texto: 'Volver al inicio', url: 'index.html' },
    },
  };

  var c = contenido[estado] || contenido.fallido;

  wrap.innerHTML =
    c.icono +
    '<h1>' + c.titulo + '</h1>' +
    '<p class="mensaje">' + c.mensaje + '</p>' +
    '<div class="info-box">' + c.info + '</div>' +
    '<div class="btns">' +
      '<a class="btn-primary" href="' + c.btn1.url + '">' + c.btn1.texto + '</a>' +
      '<a class="btn-secondary" href="' + c.btn2.url + '">' + c.btn2.texto + '</a>' +
    '</div>' +
    (pago_id ? '<p class="mp-params">ID de pago: ' + pago_id + '</p>' : '');

  // Si el pago fue exitoso, vacía el carrito y actualiza el pedido en Supabase
  if (estado === 'exitoso') {
    localStorage.removeItem('revla-carrito');

    // Actualizar estado del pedido a 'confirmado'
    var pedidoId = localStorage.getItem('revla-ultimo-pedido');
    if (pedidoId) {
      var sdkScript = document.createElement('script');
      sdkScript.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      sdkScript.onload = async function () {
        try {
          var db = supabase.createClient(
            'https://rwkkfumsuusmglwvsrrq.supabase.co',
            'sb_publishable_dY5jJk49qHdepDmzgTI0SA_LxxyqD23'
          );
          await db.from('pedidos').update({ estado: 'confirmado' }).eq('id', pedidoId);
          localStorage.removeItem('revla-ultimo-pedido');
        } catch(e) { console.warn('No se pudo actualizar pedido:', e); }
      };
      document.head.appendChild(sdkScript);
    }
  }
</script>
</body>
</html>

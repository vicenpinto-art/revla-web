<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi cuenta — Revla</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --lila: #a183ff; --lila-soft: #b9a2ff; --lila-pale: #e0d6ff; --lila-ghost: #f2eeff; --nude: #f5efe8; --black: #1a1718; --gray: #6b6570; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--lila-ghost); color: var(--black); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.94); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(161,131,255,0.15); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; text-decoration: none; color: var(--black); }
    .nav-logo em { font-style: italic; color: var(--lila); }
    .nav-back { text-decoration: none; color: var(--gray); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color .2s; }
    .nav-back:hover { color: var(--lila); }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 24px 60px; background: linear-gradient(135deg, var(--lila-ghost) 0%, var(--nude) 100%); }
    .auth-card { background: white; border-radius: 28px; padding: 48px 44px; width: 100%; max-width: 460px; box-shadow: 0 4px 48px rgba(161,131,255,.15), 0 0 0 1px rgba(161,131,255,.08); animation: fadeUp .45s ease both; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo a { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700; text-decoration: none; color: var(--black); }
    .auth-logo a em { font-style: italic; color: var(--lila); }
    .auth-logo p { font-size: 13px; color: var(--gray); margin-top: 4px; }
    .tabs { display: flex; background: var(--lila-ghost); border-radius: 14px; padding: 4px; margin-bottom: 28px; gap: 4px; }
    .tab-btn { flex: 1; padding: 11px; background: none; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: var(--gray); cursor: pointer; transition: all .2s; }
    .tab-btn.active { background: white; color: var(--black); box-shadow: 0 2px 10px rgba(161,131,255,.12); }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--gray); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px; }
    .form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid rgba(0,0,0,.1); border-radius: 12px; font-family: 'Outfit', sans-serif; font-size: 15px; color: var(--black); background: white; outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: var(--lila); box-shadow: 0 0 0 3px rgba(161,131,255,.12); }
    .form-group input::placeholder { color: rgba(0,0,0,.2); }
    .btn-primary { width: 100%; padding: 15px; background: var(--lila); color: white; border: none; border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: transform .2s, box-shadow .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(161,131,255,.4); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: rgba(0,0,0,.2); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,.08); }
    .btn-google { width: 100%; padding: 13px; background: white; border: 1.5px solid rgba(0,0,0,.1); border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color .2s, box-shadow .2s; }
    .btn-google:hover { border-color: rgba(0,0,0,.2); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .forgot { display: block; text-align: right; font-size: 12px; color: var(--lila); text-decoration: none; margin-top: -8px; margin-bottom: 16px; font-weight: 600; cursor: pointer; }
    .forgot:hover { text-decoration: underline; }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 16px; display: none; line-height: 1.5; }
    .msg.error { background: rgba(255,78,104,.1); color: #c0001a; display: block; }
    .msg.success { background: rgba(161,131,255,.12); color: #5b3fb5; display: block; }
    .msg.info { background: rgba(161,131,255,.08); color: var(--gray); display: block; border: 1px solid var(--lila-pale); }
    .vuela-note { text-align: center; margin-top: 24px; font-size: 13px; color: var(--gray); }
    .vuela-note a { color: var(--lila); text-decoration: none; font-weight: 600; }
    .dashboard { display: none; }
    .dashboard.visible { display: block; }
    .dash-welcome { text-align: center; margin-bottom: 28px; }
    .dash-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--lila), var(--lila-soft)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; margin: 0 auto 12px; }
    .dash-welcome h3 { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; margin-bottom: 4px; }
    .dash-welcome p { font-size: 13px; color: var(--gray); }
    .dash-section { margin-bottom: 24px; }
    .dash-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 12px; }
    .dash-empty { background: var(--lila-ghost); border-radius: 12px; padding: 20px; text-align: center; font-size: 14px; color: var(--gray); font-style: italic; }
    .btn-logout { width: 100%; padding: 13px; background: transparent; color: var(--gray); border: 1.5px solid rgba(0,0,0,.1); border-radius: 100px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all .2s; }
    .btn-logout:hover { border-color: #e05; color: #e05; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">rev<em>la</em></a>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Volver al inicio
  </a>
</nav>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- FORMULARIOS -->
    <div id="auth-forms">
      <div class="auth-logo">
        <a href="index.html">rev<em>la</em></a>
        <p>Ropa que obedece.</p>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login', this)">Ingresar</button>
        <button class="tab-btn" onclick="switchTab('registro', this)">Crear cuenta</button>
      </div>

      <!-- LOGIN -->
      <div class="form-panel active" id="panel-login">
        <div class="msg" id="msg-login"></div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="login-email" placeholder="tu@correo.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <span class="forgot" onclick="doReset()">¿Olvidaste tu contraseña?</span>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3c-1.6 4.3-5.7 7.4-11.3 7.4A12.4 12.4 0 1124 11.6c3 0 5.8 1.1 7.9 2.9l5.6-5.6A20 20 0 1024 44c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8A12.4 12.4 0 0124 11.6c3 0 5.8 1.1 7.9 2.9l5.6-5.6A20 20 0 006.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.8 13.5-4.7l-6.2-5.2A12 12 0 0124 35.4c-5.5 0-10.2-3.7-11.8-8.8l-6.5 5C9.6 40.8 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2-2.1 3.8-3.8 5l6.2 5.2C41.4 34.7 44 29.8 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
          Continuar con Google
        </button>
      </div>

      <!-- REGISTRO -->
      <div class="form-panel" id="panel-registro">
        <div class="msg" id="msg-registro"></div>
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="reg-nombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
        </div>
        <button class="btn-primary" id="btn-registro" onclick="doRegistro()">Crear mi cuenta</button>
        <div class="divider">o</div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3c-1.6 4.3-5.7 7.4-11.3 7.4A12.4 12.4 0 1124 11.6c3 0 5.8 1.1 7.9 2.9l5.6-5.6A20 20 0 1024 44c11 0 20-9 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8A12.4 12.4 0 0124 11.6c3 0 5.8 1.1 7.9 2.9l5.6-5.6A20 20 0 006.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.8 13.5-4.7l-6.2-5.2A12 12 0 0124 35.4c-5.5 0-10.2-3.7-11.8-8.8l-6.5 5C9.6 40.8 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2-2.1 3.8-3.8 5l6.2 5.2C41.4 34.7 44 29.8 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
          Registrarme con Google
        </button>
      </div>

      <p class="vuela-note">¿Ya tienes cuenta en <a href="https://espaciovuela.cl/login.html" target="_blank">Espacio Vuela</a>? Pronto podrás usar las mismas credenciales.</p>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
      <div class="dash-welcome">
        <div class="dash-avatar" id="dash-avatar">?</div>
        <h3 id="dash-nombre">Hola</h3>
        <p id="dash-email"></p>
      </div>
      <div class="dash-section">
        <h4>Mis pedidos</h4>
        <div class="dash-empty">Todavía no tienes pedidos. La primera cápsula llega pronto 💜</div>
      </div>
      <div class="dash-section">
        <h4>Mis datos</h4>
        <div class="dash-empty" style="text-align:left;font-style:normal;">
          <p style="font-size:13px;color:var(--gray);line-height:1.9;" id="dash-info"></p>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://rwkkfumsuusmglwvsrrq.supabase.co',
    'sb_publishable_dY5jJk49qHdepDmzgTI0SA_LxxyqD23'
  );

  function switchTab(panel, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + panel).classList.add('active');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.innerHTML = text;
  }

  function setLoading(btnId, loading, label) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<div class="spinner"></div>' : label;
  }

  function mostrarDashboard(user) {
    document.getElementById('auth-forms').style.display = 'none';
    document.getElementById('dashboard').classList.add('visible');
    const nombre = user.user_metadata?.nombre || user.email.split('@')[0];
    document.getElementById('dash-avatar').textContent = nombre[0].toUpperCase();
    document.getElementById('dash-nombre').textContent = '¡Hola, ' + nombre + '!';
    document.getElementById('dash-email').textContent = user.email;
    document.getElementById('dash-info').innerHTML =
      '<strong>Correo:</strong> ' + user.email + '<br>' +
      '<strong>Nombre:</strong> ' + nombre + '<br>' +
      '<strong>Miembro desde:</strong> ' + new Date(user.created_at).toLocaleDateString('es-CL');
  }

  // Revisar sesión al cargar
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session?.user) mostrarDashboard(session.user);
  })();

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('msg-login', 'error', 'Por favor completa todos los campos.'); return; }
    setLoading('btn-login', true, 'Ingresar');
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    setLoading('btn-login', false, 'Ingresar');
    if (error) {
      showMsg('msg-login', 'error', error.message.includes('Invalid') ? 'Correo o contraseña incorrectos.' : error.message);
    } else {
      mostrarDashboard(data.user);
    }
  }

  async function doRegistro() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    if (!nombre || !email || !pass) { showMsg('msg-registro', 'error', 'Por favor completa todos los campos.'); return; }
    if (pass.length < 6) { showMsg('msg-registro', 'error', 'La contraseña debe tener al menos 6 caracteres.'); return; }
    setLoading('btn-registro', true, 'Crear mi cuenta');
    const { data, error } = await db.auth.signUp({ email, password: pass, options: { data: { nombre } } });
    setLoading('btn-registro', false, 'Crear mi cuenta');
    if (error) {
      showMsg('msg-registro', 'error', error.message);
    } else if (data.user && !data.session) {
      showMsg('msg-registro', 'success', '✓ ¡Cuenta creada! Revisa tu correo <strong>' + email + '</strong> para confirmarla.');
    } else if (data.session) {
      mostrarDashboard(data.user);
    }
  }

  async function doGoogle() {
    const { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
    if (error) alert('Error con Google: ' + error.message);
  }

  async function doReset() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showMsg('msg-login', 'error', 'Escribe tu correo arriba primero.'); return; }
    const { error } = await db.auth.resetPasswordForEmail(email);
    if (error) {
      showMsg('msg-login', 'error', error.message);
    } else {
      showMsg('msg-login', 'info', '✓ Te enviamos un correo a <strong>' + email + '</strong> para restablecer tu contraseña.');
    }
  }

  async function doLogout() {
    await db.auth.signOut();
    document.getElementById('auth-forms').style.display = 'block';
    document.getElementById('dashboard').classList.remove('visible');
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').classList.contains('active')) doLogin();
    else doRegistro();
  });
</script>
</body>
</html>
